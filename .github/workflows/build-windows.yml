name: Build Windows EXE

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install PyMuPDF openpyxl pyinstaller

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Invoice Processor" --icon=NONE invoice_app.py

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/Invoice Processor.exe
          name: Invoice-Processor-Windows.exe

      - name: Upload as Artifact (for workflow_dispatch)
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: Invoice-Processor-Windows
          path: ./dist/Invoice Processor.exe
